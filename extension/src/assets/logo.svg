<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 118" fill="none">
  <defs>
    <radialGradient id="fill" cx="50%" cy="34%" r="64%">
      <stop offset="0%"   stop-color="#D42840"/>
      <stop offset="48%"  stop-color="#8E1624"/>
      <stop offset="100%" stop-color="#260508"/>
    </radialGradient>
    <filter id="border-glow" x="-20%" y="-15%" width="140%" height="130%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="beam-glow" x="-30%" y="-200%" width="160%" height="500%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ① Shield body -->
  <path d="M50 5 L91 18 L91 57 C91 88 71 106 50 115 C29 106 9 88 9 57 L9 18 Z"
        fill="url(#fill)"/>

  <!-- ② Glowing outer rim -->
  <path d="M50 5 L91 18 L91 57 C91 88 71 106 50 115 C29 106 9 88 9 57 L9 18 Z"
        fill="none" stroke="#E0304C" stroke-width="2.5" opacity="0.35"
        filter="url(#border-glow)"/>

  <!-- ③ Crisp 1px border -->
  <path d="M50 5 L91 18 L91 57 C91 88 71 106 50 115 C29 106 9 88 9 57 L9 18 Z"
        fill="none" stroke="#C42438" stroke-width="0.8" opacity="0.9"/>

  <!-- ④ Top-edge metallic highlight -->
  <path d="M51 6.5 L89 19" stroke="rgba(255,255,255,0.13)" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M49 6.5 L11 19" stroke="rgba(255,255,255,0.13)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- ⑤ Corner HUD brackets -->
  <path d="M15 27 L15 20 L22 20" fill="none" stroke="#D42840" stroke-width="1"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <path d="M85 27 L85 20 L78 20" fill="none" stroke="#D42840" stroke-width="1"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>

  <!-- ⑥ Scanner frame corners (taller frame) -->
  <path d="M31 38 L31 33 L36 33" fill="none" stroke="#E83050" stroke-width="1.1"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <path d="M69 38 L69 33 L64 33" fill="none" stroke="#E83050" stroke-width="1.1"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <path d="M31 75 L31 80 L36 80" fill="none" stroke="#E83050" stroke-width="1.1"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <path d="M69 75 L69 80 L64 80" fill="none" stroke="#E83050" stroke-width="1.1"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

  <!-- ⑦ Code lines — already-scanned (above beam, brighter) -->
  <rect x="43" y="39"  width="14" height="2.2" rx="1.1" fill="rgba(255,255,255,0.32)"/>
  <rect x="38" y="45"  width="24" height="2.2" rx="1.1" fill="rgba(255,255,255,0.38)"/>
  <rect x="41" y="51"  width="18" height="2.2" rx="1.1" fill="rgba(255,255,255,0.34)"/>

  <!-- ⑧ Code lines — not yet scanned (below beam, dimmer) -->
  <rect x="40" y="62"  width="20" height="2.2" rx="1.1" fill="rgba(255,255,255,0.17)"/>
  <rect x="37" y="68"  width="26" height="2.2" rx="1.1" fill="rgba(255,255,255,0.14)"/>
  <rect x="44" y="74"  width="12" height="2.2" rx="1.1" fill="rgba(255,255,255,0.11)"/>

  <!-- ⑨ Scan beam — glow layer -->
  <line x1="30" y1="57" x2="70" y2="57"
        stroke="#FF3355" stroke-width="3.5" opacity="0.28" filter="url(#beam-glow)"/>

  <!-- ⑩ Scan beam — crisp bright line -->
  <line x1="30" y1="57" x2="70" y2="57"
        stroke="rgba(255,255,255,0.85)" stroke-width="0.9"/>

  <!-- ⑪ Scan beam — left cap dot (scanner origin) -->
  <circle cx="30" cy="57" r="1.6" fill="#FF3355" opacity="0.9"/>
</svg>
